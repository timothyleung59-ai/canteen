# ============================================================
#  饭堂报餐系统 - Nginx 配置 (canteen.zsess.net)
#  与 nginx-aidio.site.conf 的区别: 这个域名的 DNS 走阿里云直连解析,
#  不经过 Cloudflare 代理, 所以源站自己用 Let's Encrypt 签发真实证书、
#  自己终结 HTTPS(不能照抄 aidio.site 那份只监听 :80 的配置)。
#  放置：/etc/nginx/conf.d/canteen-zsess.conf  然后 nginx -t && nginx -s reload
#
#  证书签发(webroot 模式, 不用 --nginx 插件自动改配置, 避免影响同机其他站点):
#    mkdir -p /var/www/certbot
#    certbot certonly --webroot -w /var/www/certbot -d canteen.zsess.net \
#      --non-interactive --agree-tos --register-unsafely-without-email
#
#  自动续期(证书90天过期, 必须配, 部署时这台机器上原来没有任何续期机制):
#    crontab: 0 3 * * * certbot renew --quiet --deploy-hook "nginx -s reload"
#
#  注意: nginx < 1.25.1 不支持 `http2 on;` 新写法, 要写在 listen 指令里
#  (listen 443 ssl http2;)。这台机器是 nginx 1.20.1, 已踩过这个坑。
# ============================================================

server {
    listen 80;
    server_name canteen.zsess.net;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name canteen.zsess.net;

    ssl_certificate     /etc/letsencrypt/live/canteen.zsess.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/canteen.zsess.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 10m;

    # ---- Web 后台静态资源 (admin-web/dist) ----
    root /var/www/canteen-admin;
    index index.html;

    # ---- 后端 API：小程序业务 / 后台 / 微信回调 ----
    location /bc/ {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }
    location /admin/ {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }
    location /wx/ {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    # ---- 前端 SPA history 路由回退 ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
