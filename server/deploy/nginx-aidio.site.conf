# ============================================================
#  饭堂报餐系统 - Nginx 配置 (aidio.site)
#  ⚠️ 已于 2026-07-01 下线, 仅作历史参考。主力域名已切到 canteen.zsess.net,
#     见 nginx-canteen.zsess.net.conf。服务器上这份配置已移到
#     /etc/nginx/conf.d.disabled/canteen-aidio.conf.bak(未删除, 可恢复)。
#  作用：HTTPS 入口 + Web 后台静态托管 + 后端 API 反向代理
#  放置：/etc/nginx/conf.d/aidio.site.conf  然后 nginx -t && nginx -s reload
# ============================================================

# HTTP: 跳转 HTTPS（保留 certbot ACME 验证路径）
server {
    listen 80;
    server_name aidio.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主站
server {
    listen 443 ssl;
    http2 on;
    server_name aidio.site;

    # 证书（certbot 签发后路径如下；自有证书改成实际路径）
    ssl_certificate     /etc/letsencrypt/live/aidio.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aidio.site/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # banner 图上传需要稍大 body
    client_max_body_size 10m;

    # ---- Web 后台静态资源 (admin-web/dist) ----
    root /var/www/canteen-admin;
    index index.html;

    # ---- 后端 API：小程序业务 / 后台 / 微信回调 ----
    # 三个前缀都反代到本机后端 8088；其余路径走前端 SPA。
    location /bc/ {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /admin/ {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /wx/ {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 说明：Druid 监控台 /druid/ 故意不对外暴露（含敏感信息）。
    # 如需访问，请用 SSH 隧道：ssh -L 8088:127.0.0.1:8088 server 后本机开 /druid/。

    # ---- 前端 SPA history 路由回退 ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
