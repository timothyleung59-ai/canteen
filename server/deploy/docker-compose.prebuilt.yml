# ============================================================
#  服务器轻量部署：用【本机已构建的 jar】跑，不在服务器上 maven 构建。
#  适配内存紧 / 共享机：各容器设内存上限 + 后端 -Xmx，后端只绑 127.0.0.1。
#  用法（在放有 app.jar / schema.sql / .env 的目录）：docker compose up -d
# ============================================================
services:
  mysql:
    image: mysql:5.7
    container_name: canteen-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: baocan
      TZ: Asia/Shanghai
    command: >
      --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=128M --performance-schema=OFF
    volumes:
      - canteen-mysql-data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    mem_limit: 600m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:6-alpine
    container_name: canteen-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 64mb --maxmemory-policy allkeys-lru
    mem_limit: 96m

  app:
    image: eclipse-temurin:8-jre
    container_name: canteen-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      TZ: Asia/Shanghai
      SERVER_PORT: "8088"
      BASE_PATH: ${BASE_PATH}
      APP_PATH: ${APP_PATH}
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: baocan
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "2"
      WX_APPID: ${WX_APPID}
      WX_SECRET: ${WX_SECRET}
      DRUID_MONITOR_USER: ${DRUID_USER}
      DRUID_MONITOR_PASSWORD: ${DRUID_PASSWORD}
      ADMIN_APPID: ${WX_APPID}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_UNIT_NAME: ${ADMIN_UNIT_NAME}
      JWT_SECRET: ${JWT_SECRET}
      XXL_JOB_RUNNABLE: "off"
      DRUID_FILTERS: "stat,wall,log4j"
      DRUID_CONNECTION_PROPERTIES: "druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000"
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m -Dfile.encoding=UTF-8 -Djava.security.egd=file:/dev/./urandom"
    volumes:
      - ./app.jar:/app/app.jar:ro
    command: ["java", "-jar", "/app/app.jar"]
    mem_limit: 768m
    ports:
      # 只绑本机回环，先内网验证，不公开暴露；对外由 Nginx 反代（后续配域名时做）
      - "127.0.0.1:8088:8088"

volumes:
  canteen-mysql-data:
  canteen-redis-data:
