######  服务配置  ######
server.port=${SERVER_PORT:8088}
######  对外访问地址(用于回调/拼接链接), 部署时改成你单位的公网域名 ######
base.path=${BASE_PATH:http://127.0.0.1:8088/}
app.path=${APP_PATH:http://127.0.0.1:8088/}

spring.servlet.multipart.location=/data/tmp
server.tomcat.remote_ip_header=x-forwarded-for
server.use-forward-headers=true
server.tomcat.remote-ip-header=x-forwarded-for
server.tomcat.protocol-header=X-Forwarded-Proto
server.tomcat.protocol-header-https-value=https

######  数据库 (通过环境变量注入, Docker 默认连 compose 里的 mysql 服务)  ######
druid.url=jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:baocan}?serverTimezone=GMT%2B8&createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&autoReconnect=true&useSSL=false
druid.driver-class=com.mysql.cj.jdbc.Driver
druid.username=${DB_USER:root}
druid.password=${DB_PASSWORD:root}
druid.initial-size=1
druid.min-idle=1
druid.max-active=20
druid.test-on-borrow=true
druid.max-wait=60000
druid.time-between-eviction-runs-millis=60000
druid.min-evictable-idle-time-millis=300000
druid.validation-query=SELECT 1 FROM DUAL
druid.test-While-Idle=true
druid.test-on-return=false
druid.pool-prepared-statements=false
druid.max-pool-prepared-statement-per-connection-size=20
druid.filters=${DRUID_FILTERS:stat,wall,log4j}
druid.connection-properties=${DRUID_CONNECTION_PROPERTIES:druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000}

######  Druid 监控台 (生产建议改强密码, 或在网关层屏蔽 /druid/*)  ######
druid.monitor.enabled=enabled
druid.monitor.druid-stat-view=/druid/*
druid.monitor.druid-web-stat-filter=/*
druid.monitor.allow=
druid.monitor.deny=
druid.monitor.login-username=${DRUID_MONITOR_USER:admin}
druid.monitor.login-password=${DRUID_MONITOR_PASSWORD:changeme_please}
druid.monitor.exclusions='*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*'
druid.monitor.reset-enable=false

######  JPA / Hibernate  ######
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5InnoDBDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.hbm2ddl.auto=none
spring.jpa.properties.hibernate.cache.region.factory_class=org.hibernate.cache.ehcache.EhCacheRegionFactory
spring.jpa.properties.hibernate.current_session_context_class=org.springframework.orm.hibernate5.SpringSessionContext

######  Redis (通过环境变量注入, Docker 默认连 compose 里的 redis 服务)  ######
spring.redis.database=${REDIS_DB:2}
spring.redis.host=${REDIS_HOST:redis}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.pool.max-active=2000
spring.redis.pool.max-wait=10000
spring.redis.pool.max-idle=8
spring.redis.pool.min-idle=0
spring.redis.timeout=10000

######  后台管理员账号 ######
# 公网部署务必修改密码! 通过环境变量 ADMIN_PASSWORD 注入, 不要把真实密码写进文件。
# ADMIN_APPID 必须填本单位小程序的 appid, 后台所有业务接口都用它。
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:admin123}
admin.appid=${ADMIN_APPID:}
admin.unit-name=${ADMIN_UNIT_NAME:饭堂报餐管理后台}
admin.token-ttl=${ADMIN_TOKEN_TTL:43200}

######  日志  ######
logging.config=classpath:log4j2-pro.xml

######  XXL-Job 分布式定时任务: 单位饭堂用不上, 默认关闭 (off 时不会启动也不会连接调度中心)  ######
xxl.job.runnable=${XXL_JOB_RUNNABLE:off}
xxl.job.admin.addresses=${XXL_JOB_ADMIN:}
xxl.job.executor.appname=xxl-job-wx
xxl.job.executor.ip=
xxl.job.executor.port=9999
xxl.job.accessToken=
xxl.job.executor.logpath=/data/logs/xxl-job
xxl.job.executor.logretentiondays=1
